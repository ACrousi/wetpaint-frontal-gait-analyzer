# ====================================
# Baseline: LSTM（對比 ResGCN）
# ====================================
workspace_root: "../../../outputs"

config: resgcn_coco
dataset: coco
gpus: [0]
seed: 1
work_dir: 'baseline_lstm/'
no_progress_bar: False

dataset_args:
  coco:
    input_path: json
    path: ""
    use_gait: false
    train_batch_size: 16
    eval_batch_size: 16
    seed: 42
    metadata_path: json/analysis_metadata.csv
    data_path: coco/train_data.npy
    label_path: coco/train_label.pkl
    eval_data_path: coco/eval_data.npy
    eval_label_path: coco/eval_label.pkl
    use_ldl: false
    ldl_config:
      type: gaussian
      sigma: 1.0
      exact_iterations: 10
    custom_bin_centers: [12, 16, 20, 24, 28, 32, 36]
    num_class: 1
    ldl_min_label: 12
    ldl_max_label: 36

# === Baseline 變量: LSTM 模型 ===
model_type: lstm
model_args:
  hidden_size: 128
  num_layers: 2
  dropout: 0.5
  bidirectional: true

optimizer: SGD
optimizer_args:
  SGD:
    lr: 0.01
    momentum: 0.9
    nesterov: true
    weight_decay: 0.001

lr_scheduler: cosine
scheduler_args:
  cosine:
    max_epoch: 120
    warm_up: 10
    eta_min: 1e-6

use_ldl: false
task_mode: regression
loss_type: mse
ordinal_weight: 2.0
early_stop_patience: 120
save_interval: 30
best_metric_criterion: spearman
